name: Update Dashboard Data

on:
  schedule:
    # Runs 3x daily — adjust to your preferred times (UTC)
    - cron: '0 5,10,16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_ORG: ${{ vars.GITHUB_ORG }}
          GITHUB_USER: ${{ vars.GITHUB_USER }}
          GITHUB_HUMAN_AUTHORS: ${{ vars.GITHUB_HUMAN_AUTHORS }}
        run: node scripts/generate-data.mjs

      - name: Scan dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_ORG: ${{ vars.GITHUB_ORG }}
          GITHUB_USER: ${{ vars.GITHUB_USER }}
        run: node scripts/scan-deps.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data.json public/data-deps.json public/data-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Health check & alerting
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          APP_URL: ${{ vars.APP_URL }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL not set — skipping health check"
            exit 0
          fi
          HEALTH=$(curl -sf "${APP_URL}/api/health-check" || echo '{"allOk":false}')
          ALL_OK=$(echo "$HEALTH" | jq -r '.allOk // false')
          if [ "$ALL_OK" != "true" ]; then
            DOWN=$(echo "$HEALTH" | jq -r '[.services[]? | select(.ok==false) | .name] | join(", ")')
            EXISTING=$(gh issue list --repo "$GITHUB_REPO" --label "alert" --state open --json number --jq length 2>/dev/null || echo "0")
            if [ "$EXISTING" = "0" ]; then
              gh issue create \
                --repo "$GITHUB_REPO" \
                --title "Alert: Services unreachable — $DOWN" \
                --body "Automated check at $(date -u +'%Y-%m-%d %H:%M UTC') detected failures.\n\n**Affected services:** $DOWN\n\n**Response:**\n\`\`\`json\n$HEALTH\n\`\`\`\n\nThis issue is auto-created and will be closed when services recover." \
                --label "alert" || echo "Could not create issue"
            fi
          else
            OPEN=$(gh issue list --repo "$GITHUB_REPO" --label "alert" --state open --json number --jq '.[].number' 2>/dev/null)
            for NUM in $OPEN; do
              gh issue close "$NUM" --repo "$GITHUB_REPO" --comment "Auto-closed — all services reachable again ($(date -u +'%Y-%m-%d %H:%M UTC'))." || true
            done
          fi
