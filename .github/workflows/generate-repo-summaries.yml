name: Generate Repo Summaries

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Generate repo summaries
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_USER: ${{ secrets.COCKPIT_USER }}
          GITHUB_ORGS: ${{ secrets.COCKPIT_ORGS }}
        run: node scripts/generate-repo-summaries.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data-repos.json
          if git diff --cached --quiet; then
            echo "No repo summary changes"
          else
            git commit -m "chore: refresh repo summaries $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
